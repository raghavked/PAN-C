<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sentinel Dashboard</title>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible+Next:ital,wght@0,200..800;1,200..800&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Tailwind Config -->
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "inverse-on-surface": "#303030",
                    "on-tertiary-fixed-variant": "#474746",
                    "tertiary-fixed-dim": "#c8c6c5",
                    "primary-fixed-dim": "#ffb3ae",
                    "surface-container-lowest": "#0e0e0e",
                    "on-error": "#690005",
                    "surface-bright": "#393939",
                    "primary": "#ffb3ae",
                    "primary-fixed": "#ffdad7",
                    "on-secondary-fixed": "#1a1c1c",
                    "on-tertiary-fixed": "#1b1c1c",
                    "background": "#131313",
                    "on-background": "#e2e2e2",
                    "inverse-primary": "#b3282c",
                    "surface-variant": "#353535",
                    "error": "#ffb4ab",
                    "surface-container": "#1f1f1f",
                    "surface-container-high": "#2a2a2a",
                    "tertiary-container": "#929090",
                    "tertiary-fixed": "#e5e2e1",
                    "outline": "#a98987",
                    "surface-dim": "#131313",
                    "surface-container-low": "#1b1b1b",
                    "on-primary-container": "#5c0009",
                    "on-secondary-fixed-variant": "#454747",
                    "on-surface": "#e2e2e2",
                    "on-tertiary-container": "#2a2a2a",
                    "secondary": "#c6c6c7",
                    "secondary-container": "#454747",
                    "secondary-fixed-dim": "#c6c6c7",
                    "on-tertiary": "#303030",
                    "on-primary": "#68000c",
                    "surface": "#131313",
                    "secondary-fixed": "#e2e2e2",
                    "on-secondary": "#2f3131",
                    "on-surface-variant": "#e1bebc",
                    "primary-container": "#f85b58",
                    "on-secondary-container": "#b4b5b5",
                    "surface-tint": "#ffb3ae",
                    "on-primary-fixed": "#410004",
                    "outline-variant": "#59413f",
                    "surface-container-highest": "#353535",
                    "tertiary": "#c8c6c5",
                    "error-container": "#93000a",
                    "on-error-container": "#ffdad6",
                    "inverse-surface": "#e2e2e2",
                    "on-primary-fixed-variant": "#900a18"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "unit": "4px",
                    "margin-desktop": "32px",
                    "container-max": "1280px",
                    "gutter": "16px",
                    "margin-mobile": "16px"
            },
            "fontFamily": {
                    "body-md": ["Atkinson Hyperlegible Next", "sans-serif"],
                    "body-lg": ["Atkinson Hyperlegible Next", "sans-serif"],
                    "label-md": ["Atkinson Hyperlegible Next", "sans-serif"],
                    "headline-md": ["Atkinson Hyperlegible Next", "sans-serif"],
                    "display-lg": ["Atkinson Hyperlegible Next", "sans-serif"],
                    "headline-lg": ["Atkinson Hyperlegible Next", "sans-serif"],
                    "label-lg": ["Atkinson Hyperlegible Next", "sans-serif"]
            },
            "fontSize": {
                    "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                    "label-md": ["12px", {"lineHeight": "16px", "fontWeight": "600"}],
                    "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "700"}],
                    "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "800"}],
                    "headline-lg": ["32px", {"lineHeight": "40px", "fontWeight": "700"}],
                    "label-lg": ["14px", {"lineHeight": "20px", "letterSpacing": "0.05em", "fontWeight": "700"}]
            }
          }
        }
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md text-body-md min-h-screen flex flex-col pb-[100px]">
<!-- TopAppBar -->
<header class="flex justify-between items-center w-full px-4 h-16 bg-background dark:bg-background border-b border-surface-variant dark:border-surface-variant sticky top-0 z-40">
<div class="flex items-center">
<div class="w-10 h-10 rounded-full bg-surface-container-high border border-surface-variant flex items-center justify-center overflow-hidden cursor-pointer hover:bg-surface-container-high transition-colors active:scale-95 transition-transform duration-75">
<span class="material-symbols-outlined text-on-surface">person</span>
</div>
</div>
<div class="font-headline-md text-headline-md font-extrabold tracking-tighter text-primary-container dark:text-primary-container uppercase">
            SENTINEL
        </div>
<div class="flex items-center">
<button class="w-10 h-10 rounded-full flex items-center justify-center text-primary-container dark:text-primary-container hover:bg-surface-container-high transition-colors active:scale-95 transition-transform duration-75">
<span class="material-symbols-outlined">settings</span>
</button>
</div>
</header>
<!-- Main Content -->
<main class="flex-grow w-full max-w-container-max mx-auto px-margin-mobile md:px-margin-desktop py-6">
<!-- Status Card -->
<section class="mb-8">
<div class="bg-surface-container border border-surface-variant rounded-lg p-4 flex items-center justify-between">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary-container" style="font-variation-settings: 'FILL' 1;">shield</span>
<span class="font-headline-md text-headline-md font-bold text-on-surface uppercase">Protected</span>
</div>
<div class="px-3 py-1 bg-surface-container-highest border border-surface-variant rounded-full">
<span class="font-label-md text-label-md text-secondary uppercase tracking-widest">Active</span>
</div>
</div>
</section>
<!-- Panic Button Area -->
<section class="flex justify-center items-center py-12 mb-8">
<button class="w-[280px] h-[280px] rounded-full bg-primary-container flex flex-col items-center justify-center shadow-[0_0_60px_rgba(248,91,88,0.3)] active:scale-95 active:shadow-[0_0_20px_rgba(248,91,88,0.5)] transition-all duration-150 border-4 border-background outline outline-[4px] outline-primary-container ring-offset-4 ring-offset-background">
<span class="material-symbols-outlined text-on-primary-container text-[80px] mb-2" style="font-variation-settings: 'FILL' 1;">warning</span>
<span class="font-display-lg text-display-lg text-on-primary-container uppercase">TAP NOW</span>
</button>
</section>
<!-- 2x2 Grid Actions -->
<section class="grid grid-cols-2 gap-4 mb-12">
<!-- Map -->
<button class="bg-surface-container border border-surface-variant rounded-lg p-6 flex flex-col items-start justify-between h-32 hover:bg-surface-container-high hover:border-outline-variant transition-colors active:scale-95 duration-75">
<span class="material-symbols-outlined text-secondary mb-2" style="font-variation-settings: 'FILL' 1;">map</span>
<span class="font-headline-md text-headline-md font-bold text-on-surface">Map</span>
</button>
<!-- Documents -->
<button class="bg-surface-container border border-surface-variant rounded-lg p-6 flex flex-col items-start justify-between h-32 hover:bg-surface-container-high hover:border-outline-variant transition-colors active:scale-95 duration-75">
<span class="material-symbols-outlined text-secondary mb-2" style="font-variation-settings: 'FILL' 1;">description</span>
<span class="font-headline-md text-headline-md font-bold text-on-surface">Documents</span>
</button>
<!-- Contacts -->
<button class="bg-surface-container border border-surface-variant rounded-lg p-6 flex flex-col items-start justify-between h-32 hover:bg-surface-container-high hover:border-outline-variant transition-colors active:scale-95 duration-75">
<span class="material-symbols-outlined text-secondary mb-2" style="font-variation-settings: 'FILL' 1;">group</span>
<span class="font-headline-md text-headline-md font-bold text-on-surface">Contacts</span>
</button>
<!-- Settings -->
<button class="bg-surface-container border border-surface-variant rounded-lg p-6 flex flex-col items-start justify-between h-32 hover:bg-surface-container-high hover:border-outline-variant transition-colors active:scale-95 duration-75">
<span class="material-symbols-outlined text-secondary mb-2" style="font-variation-settings: 'FILL' 1;">tune</span>
<span class="font-headline-md text-headline-md font-bold text-on-surface">Settings</span>
</button>
</section>
<!-- Recent Activity -->
<section>
<h2 class="font-headline-lg text-headline-lg font-bold text-on-surface mb-6 uppercase border-b border-surface-variant pb-2">Recent Activity</h2>
<div class="flex flex-col gap-3">
<!-- Activity Item 1 -->
<div class="bg-surface-container-low border border-surface-variant rounded-lg p-4 flex items-center justify-between">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-full bg-surface-container-highest flex items-center justify-center">
<span class="material-symbols-outlined text-secondary">location_on</span>
</div>
<div>
<div class="font-label-lg text-label-lg text-on-surface uppercase">Location Updated</div>
<div class="font-body-md text-body-md text-secondary">Coordinates synced successfully.</div>
</div>
</div>
<span class="font-label-md text-label-md text-secondary">10:42 AM</span>
</div>
<!-- Activity Item 2 -->
<div class="bg-surface-container-low border border-surface-variant rounded-lg p-4 flex items-center justify-between">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-full bg-surface-container-highest flex items-center justify-center">
<span class="material-symbols-outlined text-primary-container">gavel</span>
</div>
<div>
<div class="font-label-lg text-label-lg text-on-surface uppercase">Rights Accessed</div>
<div class="font-body-md text-body-md text-secondary">Document 'Stop &amp; ID' viewed.</div>
</div>
</div>
<span class="font-label-md text-label-md text-secondary">YESTERDAY</span>
</div>
<!-- Activity Item 3 -->
<div class="bg-surface-container-low border border-surface-variant rounded-lg p-4 flex items-center justify-between opacity-75">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-full bg-surface-container-highest flex items-center justify-center">
<span class="material-symbols-outlined text-secondary">timer_off</span>
</div>
<div>
<div class="font-label-lg text-label-lg text-on-surface uppercase">Timer Cancelled</div>
<div class="font-body-md text-body-md text-secondary">Safety check-in dismissed.</div>
</div>
</div>
<span class="font-label-md text-label-md text-secondary">OCT 12</span>
</div>
</div>
</section>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center h-20 px-margin-mobile bg-surface-container border-t-2 border-outline-variant dark:border-outline-variant md:hidden">
<!-- Active Nav Item -->
<button class="flex flex-col items-center justify-center bg-primary-container dark:bg-primary-container text-on-primary-container dark:text-on-primary-container rounded-lg px-4 py-1 active:scale-90 transition-transform duration-100 ease-in-out hover:bg-surface-container-highest">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">emergency</span>
<span class="font-label-lg text-label-lg uppercase mt-1">Panic</span>
</button>
<!-- Inactive Nav Item -->
<button class="flex flex-col items-center justify-center text-secondary dark:text-secondary px-4 py-1 active:scale-90 transition-transform duration-100 ease-in-out hover:bg-surface-container-highest rounded-lg">
<span class="material-symbols-outlined">timer</span>
<span class="font-label-lg text-label-lg uppercase mt-1">Timer</span>
</button>
<!-- Inactive Nav Item -->
<button class="flex flex-col items-center justify-center text-secondary dark:text-secondary px-4 py-1 active:scale-90 transition-transform duration-100 ease-in-out hover:bg-surface-container-highest rounded-lg">
<span class="material-symbols-outlined">group</span>
<span class="font-label-lg text-label-lg uppercase mt-1">Contacts</span>
</button>
<!-- Inactive Nav Item -->
<button class="flex flex-col items-center justify-center text-secondary dark:text-secondary px-4 py-1 active:scale-90 transition-transform duration-100 ease-in-out hover:bg-surface-container-highest rounded-lg">
<span class="material-symbols-outlined">gavel</span>
<span class="font-label-lg text-label-lg uppercase mt-1">Rights</span>
</button>
</nav>
</body></html>
